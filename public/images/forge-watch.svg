<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" fill="none">
  <defs>
    <radialGradient id="forge-face" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0F1B30"/>
      <stop offset="100%" stop-color="#050B17"/>
    </radialGradient>
    <linearGradient id="forge-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2530"/>
      <stop offset="50%" stop-color="#2a3340"/>
      <stop offset="100%" stop-color="#161b24"/>
    </linearGradient>
    <linearGradient id="forge-bronze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a6a3a"/>
      <stop offset="50%" stop-color="#a07d48"/>
      <stop offset="100%" stop-color="#5d4424"/>
    </linearGradient>
  </defs>
  <!-- Correa NATO -->
  <rect x="148" y="20" width="104" height="80" fill="url(#forge-band)" stroke="#4488FF" stroke-opacity="0.18" stroke-width="1"/>
  <line x1="148" y1="35" x2="252" y2="35" stroke="#4488FF" stroke-opacity="0.18" stroke-width="0.5"/>
  <line x1="148" y1="55" x2="252" y2="55" stroke="#4488FF" stroke-opacity="0.18" stroke-width="0.5"/>
  <line x1="148" y1="75" x2="252" y2="75" stroke="#4488FF" stroke-opacity="0.18" stroke-width="0.5"/>
  <rect x="148" y="300" width="104" height="80" fill="url(#forge-band)" stroke="#4488FF" stroke-opacity="0.18" stroke-width="1"/>
  <line x1="148" y1="320" x2="252" y2="320" stroke="#4488FF" stroke-opacity="0.18" stroke-width="0.5"/>
  <line x1="148" y1="345" x2="252" y2="345" stroke="#4488FF" stroke-opacity="0.18" stroke-width="0.5"/>
  <line x1="148" y1="365" x2="252" y2="365" stroke="#4488FF" stroke-opacity="0.18" stroke-width="0.5"/>
  <!-- Hebillas bronce -->
  <rect x="148" y="65" width="104" height="6" fill="url(#forge-bronze)" stroke="#5d4424"/>
  <rect x="148" y="329" width="104" height="6" fill="url(#forge-bronze)" stroke="#5d4424"/>
  <!-- Lugs -->
  <rect x="142" y="95" width="8" height="20" fill="url(#forge-bronze)" stroke="#5d4424"/>
  <rect x="250" y="95" width="8" height="20" fill="url(#forge-bronze)" stroke="#5d4424"/>
  <rect x="142" y="285" width="8" height="20" fill="url(#forge-bronze)" stroke="#5d4424"/>
  <rect x="250" y="285" width="8" height="20" fill="url(#forge-bronze)" stroke="#5d4424"/>
  <!-- Crown bronce -->
  <rect x="296" y="195" width="14" height="14" rx="1" fill="url(#forge-bronze)" stroke="#5d4424"/>
  <line x1="298" y1="198" x2="308" y2="198" stroke="#3a2a18" stroke-width="0.6"/>
  <line x1="298" y1="201" x2="308" y2="201" stroke="#3a2a18" stroke-width="0.6"/>
  <line x1="298" y1="204" x2="308" y2="204" stroke="#3a2a18" stroke-width="0.6"/>
  <!-- Caja bronce envejecido -->
  <circle cx="200" cy="200" r="100" fill="url(#forge-bronze)" stroke="#3a2a18" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="92" fill="url(#forge-face)" stroke="#4488FF" stroke-opacity="0.3" stroke-width="0.8"/>
  <!-- Bisel marcado tipo diver -->
  <circle cx="200" cy="200" r="86" fill="none" stroke="#4488FF" stroke-opacity="0.2" stroke-width="0.5"/>
  <g stroke="#4488FF" stroke-opacity="0.55" stroke-linecap="round">
    <line x1="200" y1="100" x2="200" y2="108" stroke-width="2.5"/>
    <line x1="200" y1="292" x2="200" y2="300" stroke-width="2.5"/>
    <line x1="100" y1="200" x2="108" y2="200" stroke-width="2.5"/>
    <line x1="292" y1="200" x2="300" y2="200" stroke-width="2.5"/>
  </g>
  <!-- Triángulo en 12 -->
  <path d="M200 110 L196 118 L204 118 Z" fill="#4488FF"/>
  <!-- Indices grandes (azul medianoche dial) -->
  <g stroke="#F0F7F0" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="200" y1="125" x2="200" y2="138" stroke-width="3"/>
    <line x1="200" y1="262" x2="200" y2="275" stroke-width="3"/>
    <line x1="125" y1="200" x2="138" y2="200" stroke-width="3"/>
    <line x1="262" y1="200" x2="275" y2="200" stroke-width="3"/>
  </g>
  <g stroke="#F0F7F0" stroke-linecap="round" stroke-opacity="0.6">
    <line x1="240" y1="130.5" x2="244" y2="137.4" stroke-width="2"/>
    <line x1="269.5" y1="160" x2="262.6" y2="156" stroke-width="2"/>
    <line x1="269.5" y1="240" x2="262.6" y2="244" stroke-width="2"/>
    <line x1="240" y1="269.5" x2="244" y2="262.6" stroke-width="2"/>
    <line x1="160" y1="269.5" x2="156" y2="262.6" stroke-width="2"/>
    <line x1="130.5" y1="240" x2="137.4" y2="244" stroke-width="2"/>
    <line x1="130.5" y1="160" x2="137.4" y2="156" stroke-width="2"/>
    <line x1="160" y1="130.5" x2="156" y2="137.4" stroke-width="2"/>
  </g>
  <!-- Marca -->
  <text x="200" y="172" text-anchor="middle" font-family="serif" font-weight="700" font-size="10" fill="#4488FF" fill-opacity="0.9" letter-spacing="3">OBSIDIAN</text>
  <text x="200" y="184" text-anchor="middle" font-family="monospace" font-size="5" fill="#F0F7F0" fill-opacity="0.5" letter-spacing="2">FORGE · 03</text>
  <text x="200" y="240" text-anchor="middle" font-family="serif" font-size="7" fill="#4488FF" fill-opacity="0.7" letter-spacing="1">AUTOMATIC · 5 ATM</text>
  <!-- Manecillas con lume azul -->
  <line x1="200" y1="200" x2="200" y2="148" stroke="#F0F7F0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="240" y2="180" stroke="#F0F7F0" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="186" y2="252" stroke="#4488FF" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="200" cy="200" r="5" fill="url(#forge-bronze)" stroke="#3a2a18"/>
</svg>
