<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" fill="none">
  <defs>
    <radialGradient id="alba-face" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#F0E5CE"/>
      <stop offset="100%" stop-color="#D9C9A4"/>
    </radialGradient>
    <linearGradient id="alba-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2515"/>
      <stop offset="50%" stop-color="#4d3220"/>
      <stop offset="100%" stop-color="#2a1a0d"/>
    </linearGradient>
  </defs>
  <!-- Correa cognac -->
  <rect x="148" y="20" width="104" height="80" rx="8" fill="url(#alba-band)" stroke="#D4AA60" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="160" y1="40" x2="240" y2="40" stroke="#D4AA60" stroke-opacity="0.25" stroke-width="0.6" stroke-dasharray="3 2"/>
  <line x1="160" y1="80" x2="240" y2="80" stroke="#D4AA60" stroke-opacity="0.25" stroke-width="0.6" stroke-dasharray="3 2"/>
  <rect x="148" y="300" width="104" height="80" rx="8" fill="url(#alba-band)" stroke="#D4AA60" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="160" y1="320" x2="240" y2="320" stroke="#D4AA60" stroke-opacity="0.25" stroke-width="0.6" stroke-dasharray="3 2"/>
  <line x1="160" y1="360" x2="240" y2="360" stroke="#D4AA60" stroke-opacity="0.25" stroke-width="0.6" stroke-dasharray="3 2"/>
  <!-- Lugs -->
  <rect x="142" y="95" width="8" height="20" fill="#D4D4D4" stroke="#888"/>
  <rect x="250" y="95" width="8" height="20" fill="#D4D4D4" stroke="#888"/>
  <rect x="142" y="285" width="8" height="20" fill="#D4D4D4" stroke="#888"/>
  <rect x="250" y="285" width="8" height="20" fill="#D4D4D4" stroke="#888"/>
  <!-- Crown -->
  <rect x="296" y="195" width="14" height="14" rx="2" fill="#C8C8C8" stroke="#888"/>
  <line x1="298" y1="198" x2="308" y2="198" stroke="#666" stroke-width="0.6"/>
  <line x1="298" y1="201" x2="308" y2="201" stroke="#666" stroke-width="0.6"/>
  <line x1="298" y1="204" x2="308" y2="204" stroke="#666" stroke-width="0.6"/>
  <!-- Caja en acero -->
  <circle cx="200" cy="200" r="100" fill="#D8D8D8" stroke="#999" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="92" fill="url(#alba-face)" stroke="#D4AA60" stroke-opacity="0.4" stroke-width="0.8"/>
  <circle cx="200" cy="200" r="86" fill="none" stroke="#D4AA60" stroke-opacity="0.18" stroke-width="0.5"/>
  <!-- Numeros romanos en marfil -->
  <g font-family="serif" font-size="14" fill="#3a2515" font-weight="500">
    <text x="200" y="146" text-anchor="middle">XII</text>
    <text x="259" y="206" text-anchor="middle">III</text>
    <text x="200" y="262" text-anchor="middle">VI</text>
    <text x="142" y="206" text-anchor="middle">IX</text>
  </g>
  <!-- Indices intermedios -->
  <g stroke="#3a2515" stroke-linecap="round" stroke-opacity="0.6">
    <line x1="240" y1="130.5" x2="244" y2="137.4" stroke-width="1.2"/>
    <line x1="269.5" y1="160" x2="262.6" y2="156" stroke-width="1.2"/>
    <line x1="269.5" y1="240" x2="262.6" y2="244" stroke-width="1.2"/>
    <line x1="240" y1="269.5" x2="244" y2="262.6" stroke-width="1.2"/>
    <line x1="160" y1="269.5" x2="156" y2="262.6" stroke-width="1.2"/>
    <line x1="130.5" y1="240" x2="137.4" y2="244" stroke-width="1.2"/>
    <line x1="130.5" y1="160" x2="137.4" y2="156" stroke-width="1.2"/>
    <line x1="160" y1="130.5" x2="156" y2="137.4" stroke-width="1.2"/>
  </g>
  <!-- Subdial fecha -->
  <rect x="220" y="195" width="20" height="14" rx="1" fill="#fff" stroke="#3a2515" stroke-opacity="0.4"/>
  <text x="230" y="205" text-anchor="middle" font-family="serif" font-size="9" fill="#3a2515">23</text>
  <!-- Manecillas -->
  <line x1="200" y1="200" x2="200" y2="148" stroke="#3a2515" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="240" y2="180" stroke="#3a2515" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="186" y2="252" stroke="#D4AA60" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="200" cy="200" r="4" fill="#D4AA60"/>
  <!-- Marca -->
  <text x="200" y="172" text-anchor="middle" font-family="serif" font-style="italic" font-size="11" fill="#3a2515" letter-spacing="2">OBSIDIAN</text>
  <text x="200" y="184" text-anchor="middle" font-family="serif" font-size="6" fill="#D4AA60" letter-spacing="3">ALBA · 02</text>
</svg>
